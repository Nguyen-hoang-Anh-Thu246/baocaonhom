    let markers = [];

    let routingControl = null;

    let userPos = null;



    window.updateMap = function(type = 'tatca') {

        if (routingControl) { map.removeControl(routingControl); routingControl = null; }

        markers.forEach(m => map.removeLayer(m));

        markers = [];

        const query = document.getElementById('searchInput').value.toLowerCase();

        locations.forEach(loc => {

            if ((type === 'tatca' || loc.type === type) && (loc.name.toLowerCase().includes(query))) {

                let m = L.marker([loc.lat, loc.lng]).addTo(map)

                    .bindPopup(`<strong>${loc.name}</strong><br><button class="btn btn-sm btn-info mt-2" onclick="window.startRouting(${loc.lat}, ${loc.lng})">📍 Chỉ đường</button>`);

                markers.push(m);

            }

        });

    };



    window.startRouting = function(lat, lng) {

        if (!userPos) { alert("Đang xác định vị trí..."); return; }

        if (routingControl) map.removeControl(routingControl);

        routingControl = L.Routing.control({ waypoints: [L.latLng(userPos.lat, userPos.lng), L.latLng(lat, lng)], routeWhileDragging: true }).addTo(map);

    };



    map.on('locationfound', e => { userPos = e.latlng; L.marker(userPos).addTo(map).bindPopup("Bạn ở đây").openPopup(); });

    map.locate({setView: true, maxZoom: 14});



    window.addComment = function() {

        const user = document.getElementById('userName').value || "Người ẩn danh";

        const text = document.getElementById('commentText').value;

        if(text.trim()) { 

            push(commentsRef, { username: user, comment: text }); 

            document.getElementById('commentText').value = ''; 

        }

    };



    onValue(commentsRef, (snapshot) => {

        const data = snapshot.val();

        const list = document.getElementById('commentList');

        list.innerHTML = '';

        if (data) {

            Object.values(data).reverse().forEach(c => {

                const div = document.createElement('div');

                div.className = 'p-2 mb-2 bg-light rounded';

                div.innerHTML = `<strong>${c.username}:</strong> ${c.comment}`;

                list.appendChild(div);

            });

        }

    });
